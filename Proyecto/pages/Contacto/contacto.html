<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="../../estilos/servicios.css"> 
    <link rel="icon" type="image/x-icon" href="../../img/favico.ico">
</head>
<body>
   <header>
        <nav class="introduccion">
            <a href="../../Index.html">
                <img src="../../img/Logo Blanco.png" alt="Logo Principal" class="logo-img">
            </a>
            <ul>
                <li><a href="../../Index.html">Inicio</a></li>
                <li><a href="../Servicios/servicios.html">Servicios</a></li>
                <li><a href="../Cursos/cursos.html">Cursos</a></li>
                <li><a href="../Publicaciones/Publicaciones.html">Publicaciones</a></li>
                <li><a href="../Meditaciones/meditaciones.html">Meditaciones</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li>
                    <a href="../carrito.html">
                        <i class="fa-solid fa-cart-arrow-down"></i>
                    </a>
                </li>
            </ul>
        </nav>
   </header> 

   <main class="container my-5">
       <div class="row justify-content-center">
           <div class="col-md-8 col-lg-6">
               
               <h2 class="text-center mb-4" style="font-family: 'Poppins', sans-serif; color: #fff; background-color: #6A1B1B; padding: 10px; border-radius: 5px;">
                   Contáctame
               </h2>
               
               <div class="card shadow-sm p-4">
                   <form>
                       <div class="mb-3">
                           <label for="nombre" class="form-label">Nombre Completo</label>
                           <input type="text" class="form-control" id="nombre" placeholder="Tu nombre aquí" required>
                       </div>

                       <div class="mb-3">
                           <label for="email" class="form-label">Correo Electrónico</label>
                           <input type="email" class="form-control" id="email" placeholder="nombre@correo.com" required>
                       </div>

                       <div class="mb-3">
                           <label for="motivo" class="form-label">¿En qué puedo ayudarte?</label>
                           <select class="form-select" id="motivo">
                               <option selected>Selecciona una opción...</option>
                               <option value="coaching">Sesión de Coaching</option>
                               <option value="tarot">Lectura de Tarot</option>
                               <option value="cursos">Información sobre Cursos</option>
                               <option value="otros">Otras consultas</option>
                           </select>
                       </div>

                       <div class="mb-3">
                           <label for="mensaje" class="form-label">Tu Mensaje</label>
                           <textarea class="form-control" id="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
                       </div>

                       <button type="submit" class="btn w-100 text-white" style="background-color: #6A1B1B;">
                           Enviar Mensaje
                       </button>
                   </form>
               </div>

           </div>
       </div>
   </main>

   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
